apiVersion: apps/v1
kind: Deployment
metadata:
  name: statement-fetcher-backend
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: backend
          image: ghcr.io/example/statement-fetcher-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8765
              name: http
          envFrom:
            - configMapRef:
                name: statement-fetcher-backend-config
            - secretRef:
                name: statement-fetcher-backend-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: app-data
              mountPath: /app/config
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: statement-fetcher-backend-data
