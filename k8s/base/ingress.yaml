apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: statement-fetcher
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - statement-fetcher.example.com
      secretName: statement-fetcher-tls
  rules:
    - host: statement-fetcher.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: statement-fetcher-backend
                port:
                  number: 8765
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: statement-fetcher-backend
                port:
                  number: 8765
          - path: /plaid
            pathType: Prefix
            backend:
              service:
                name: statement-fetcher-backend
                port:
                  number: 8765
          - path: /
            pathType: Prefix
            backend:
              service:
                name: statement-fetcher-frontend
                port:
                  number: 80
