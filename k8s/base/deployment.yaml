apiVersion: apps/v1
kind: Deployment
metadata:
  name: statement-fetcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: statement-fetcher
  template:
    metadata:
      labels:
        app: statement-fetcher
    spec:
      containers:
        - name: app
          image: ghcr.io/example/statement-fetcher:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8765
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - configMapRef:
                name: statement-fetcher-config
            - secretRef:
                name: statement-fetcher-secrets
          args: ["uv", "run", "statement-fetcher", "serve", "--env", "production", "--host", "0.0.0.0", "--port", "8765"]
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8765
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8765
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: config-data
              mountPath: /app/config
      volumes:
        - name: config-data
          persistentVolumeClaim:
            claimName: statement-fetcher-pvc
