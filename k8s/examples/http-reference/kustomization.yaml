apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: statement-fetcher

# Consume the stack from GitHub over HTTPS.
# Replace ref=main with a release tag (for example: ref=v0.1.0) in production.
resources:
  - https://github.com/chrispyduck/plaid-statement-fetcher//k8s/base?ref=main

# Override image tags/digests for your deployment target.
images:
  - name: ghcr.io/example/statement-fetcher-backend
    newName: ghcr.io/chrispyduck/statement-fetcher-backend
    newTag: latest
  - name: ghcr.io/example/statement-fetcher-frontend
    newName: ghcr.io/chrispyduck/statement-fetcher-frontend
    newTag: latest

patches:
  # Example ingress host/TLS customization.
  - target:
      kind: Ingress
      name: statement-fetcher
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: statement-fetcher.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: statement-fetcher.example.com
      - op: replace
        path: /spec/tls/0/secretName
        value: statement-fetcher-tls
