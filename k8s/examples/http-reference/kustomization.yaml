apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: statement-fetcher

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: statement-fetcher-backend-secrets
    literals:
      - PLAID_CLIENT_ID=replace-me
      - PLAID_SECRET=replace-me
      - PSF_ENCRYPTION_SECRET=replace-me-with-a-long-random-secret

# Consume the stack from GitHub over HTTPS.
# Replace ref=main with a release tag (for example: ref=v0.1.0) in production.
resources:
  - https://github.com/chrispyduck/plaid-statement-fetcher//k8s/base?ref=main

# Override image tags/digests for your deployment target.
images:
  - name: ghcr.io/chrispyduck/plaid-statement-fetcher-backend
    newTag: main
  - name: ghcr.io/chrispyduck/plaid-statement-fetcher-frontend
    newTag: main

patches:
  # Example ingress host/TLS customization.
  - target:
      kind: Ingress
      name: statement-fetcher
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: statement-fetcher.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: statement-fetcher.example.com
      - op: replace
        path: /spec/tls/0/secretName
        value: statement-fetcher-tls
