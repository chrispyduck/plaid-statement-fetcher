name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-backend:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository }}-backend:latest

      - name: Build and push frontend release image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-frontend:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository }}-frontend:latest

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Build release artifacts
        run: |
          mkdir -p dist
          kubectl kustomize k8s/base > "dist/k8s-manifests-${GITHUB_REF_NAME}.yaml"
          tar -czf "dist/k8s-base-${GITHUB_REF_NAME}.tar.gz" k8s/base
          sha256sum "dist/k8s-manifests-${GITHUB_REF_NAME}.yaml" "dist/k8s-base-${GITHUB_REF_NAME}.tar.gz" > "dist/checksums-${GITHUB_REF_NAME}.txt"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/k8s-manifests-${{ steps.version.outputs.tag }}.yaml
            dist/k8s-base-${{ steps.version.outputs.tag }}.tar.gz
            dist/checksums-${{ steps.version.outputs.tag }}.txt
